services:

  # =========================
  # ZOOKEEPER
  # =========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: zookeeper
    hostname: zookeeper

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    ports:
      - "2181:2181"

    volumes:
      - ./volumes/zookeeper/data:/var/lib/zookeeper/data
      - ./volumes/zookeeper/log:/var/lib/zookeeper/log

    networks:
      - fraud-network


  # =========================
  # KAFKA BROKER 1
  # =========================
  kafka1:
    image: confluentinc/cp-kafka:7.3.2
    container_name: kafka1
    hostname: kafka1

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka1:29092,EXTERNAL://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - ./volumes/kafka/kafka1:/var/lib/kafka/data

    networks:
      - fraud-network


  # =========================
  # KAFKA BROKER 2
  # =========================
  kafka2:
    image: confluentinc/cp-kafka:7.3.2
    container_name: kafka2
    hostname: kafka2

    depends_on:
      - zookeeper

    ports:
      - "9093:9093"

    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29093,EXTERNAL://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka2:29093,EXTERNAL://localhost:9093

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - ./volumes/kafka/kafka2:/var/lib/kafka/data

    networks:
      - fraud-network


  # =========================
  # KAFKA BROKER 3
  # =========================
  kafka3:
    image: confluentinc/cp-kafka:7.3.2
    container_name: kafka3
    hostname: kafka3

    depends_on:
      - zookeeper

    ports:
      - "9094:9094"

    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29094,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka3:29094,EXTERNAL://localhost:9094

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - ./volumes/kafka/kafka3:/var/lib/kafka/data

    networks:
      - fraud-network


  # =========================
  # KAFKA UI
  # =========================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui

    depends_on:
      - kafka1
      - kafka2
      - kafka3

    ports:
      - "8085:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: FraudCluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:29092,kafka2:29093,kafka3:29094

    networks:
      - fraud-network


  # =========================
  # SPARK MASTER
  # =========================
  spark-master:
    image: easewithdata/spark-master:3.5.5
    container_name: spark-master
    hostname: spark-master

    ports:
      - "7077:7077"
      - "8080:8080"

    environment:
      - SPARK_MODE=master

    volumes:
      - ./spark-app:/opt/spark-app
      - ./data:/data

    networks:
      - fraud-network


  # =========================
  # SPARK WORKER 1
  # =========================
  spark-worker-1:
    image: easewithdata/spark-worker:3.5.5
    container_name: spark-worker-1
    hostname: spark-worker-1

    depends_on:
      - spark-master

    ports:
      - "8081:8081"

    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077

    volumes:
      - ./spark-app:/opt/spark-app
      - ./data:/data

    networks:
      - fraud-network


  # =========================
  # SPARK WORKER 2
  # =========================
  spark-worker-2:
    image: easewithdata/spark-worker:3.5.5
    container_name: spark-worker-2
    hostname: spark-worker-2

    depends_on:
      - spark-master

    ports:
      - "8082:8081"

    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077

    volumes:
      - ./spark-app:/opt/spark-app
      - ./data:/data

    networks:
      - fraud-network


networks:
  fraud-network:
    name: fraud-network